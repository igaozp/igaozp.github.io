mainSections   = ["posts"]
rssFullContent = true
favicon        = "/favicon.svg"

[footer]
    since      = 2016
    customText = ""

[dateFormat]
    published   = "Jan 02, 2006"
    lastUpdated = "Jan 02, 2006 15:04 MST"

[sidebar]
    emoji    = "😅"
    subtitle = "Existence precedes essence"
    avatar   = "img/avatar.png"

[article]
    math        = true
    toc         = false
    readingTime = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[comments]
    enabled  = true
    provider = "disqus"

    [comments.disqusjs]
        shortname  = "andornot-xyz"
        apiUrl     = ""
        apiKey     = ""
        admin      = ""
        adminLabel = ""

[opengraph.twitter]
    site = "pzoagi"
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

[imageProcessing]
    [imageProcessing.thumbnail]
        enabled = true
    [imageProcessing.content]
        enabled = true
